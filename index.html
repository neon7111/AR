<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lamborghini AR Experience</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        model-viewer { width: 100%; height: 85vh; }
        .ar-button { background: #ff4500; border: none; padding: 15px 35px; color: white; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

    <model-viewer 
        src="Huracan-EVO-RWD-Spyder-opt-22.usdz" 
        ios-src="Huracan-EVO-RWD-Spyder-opt-22.usdz"
        ar 
        ar-modes="quick-look scene-viewer webxr" 
        camera-controls 
        shadow-intensity="2" 
        auto-rotate>
        
        <button slot="ar-button" class="ar-button">
            🏎️ PLACE CAR IN ROOM
        </button>
        
    </model-viewer>

    <h2 style="margin-bottom: 5px;">Huracán EVO Spyder</h2>
    <p style="margin-top: 0; opacity: 0.7;">Scan with phone to visualize</p>

</body>
</html>
